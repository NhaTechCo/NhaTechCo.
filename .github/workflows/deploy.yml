name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Khong chay 2 deploy cung luc
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Chuan bi SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync code len VPS (giu nguyen .env, node_modules, .next, .data)
        run: |
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.data' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.log' \
            --exclude '.edge-*' \
            --exclude 'visual-checks' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/nhatech/"

      - name: Build & restart tren VPS
        run: |
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash /root/nhatech/deploy.sh'
